<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#0d0b14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>EduBot – AI Learning Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}

/* ── Tokens ── */
:root{
  --bg:#0d0b14;--bg2:#13101f;
  --surface:rgba(255,255,255,0.05);--surface-border:rgba(255,255,255,0.09);
  --accent:#7c6fff;--accent2:#b06eff;--accent-glow:rgba(124,111,255,0.35);
  --text:#f0edff;--text2:rgba(240,237,255,0.55);--text3:rgba(240,237,255,0.28);
  --input-bg:rgba(255,255,255,0.06);--input-border:rgba(255,255,255,0.14);
  --bubble-bot:rgba(255,255,255,0.07);--bubble-bot-border:rgba(255,255,255,0.10);
  --sidebar-bg:#0b0918;--sidebar-border:rgba(255,255,255,0.07);
  --chip-bg:rgba(124,111,255,0.15);--chip-border:rgba(124,111,255,0.35);--chip-text:rgba(200,196,255,0.9);
  --scroll:rgba(255,255,255,0.12);--hist-hover:rgba(124,111,255,0.18);
  --badge-bg:rgba(124,111,255,0.25);--badge-text:#c8c0ff;
  --topbar-bg:rgba(13,11,20,0.88);--code-bg:#1a1630;
  --glow-page:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(124,111,255,0.2) 0%,transparent 70%);
}
body.light{
  --bg:#f6f4ff;--bg2:#eeebff;
  --surface:rgba(255,255,255,0.8);--surface-border:rgba(124,111,255,0.18);
  --accent:#5b4fe8;--accent2:#9a6bda;--accent-glow:rgba(91,79,232,0.25);
  --text:#1a1540;--text2:#6b5ea8;--text3:#b0a8d0;
  --input-bg:#fff;--input-border:rgba(124,111,255,0.22);
  --bubble-bot:#fff;--bubble-bot-border:rgba(124,111,255,0.15);
  --sidebar-bg:#ebe8ff;--sidebar-border:rgba(124,111,255,0.14);
  --chip-bg:rgba(124,111,255,0.1);--chip-border:rgba(124,111,255,0.28);--chip-text:#4a3ab8;
  --scroll:rgba(124,111,255,0.18);--hist-hover:rgba(124,111,255,0.13);
  --badge-bg:rgba(124,111,255,0.12);--badge-text:#4a3ab8;
  --topbar-bg:rgba(246,244,255,0.88);--code-bg:#edeaff;
  --glow-page:none;
}

/* ── App shell ── */
#app{
  position:fixed;inset:0;
  background:var(--bg);
  font-family:'Sora',sans-serif;
  display:flex;flex-direction:row;
  overflow:hidden;
}
#app::before{
  content:'';position:fixed;inset:0;
  background:var(--glow-page);
  pointer-events:none;z-index:0;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:99px}

/* ── Sidebar ── */
#sidebar{
  width:0;min-width:0;
  background:var(--sidebar-bg);
  border-right:1px solid var(--sidebar-border);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .28s cubic-bezier(.4,0,.2,1),min-width .28s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;z-index:10;
}
#sidebar.open{width:258px;min-width:258px}
#sidebar-inner{padding:18px 14px;overflow-y:auto;flex:1}
.sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sidebar-title{color:var(--text);font-weight:600;font-size:.88rem}
.hist-item{
  background:var(--surface);border:1px solid var(--surface-border);
  border-radius:10px;padding:9px 11px;margin-bottom:7px;
  cursor:pointer;transition:background .18s,border-color .18s;
}
.hist-item:hover{background:var(--hist-hover);border-color:var(--chip-border)}
.hist-text{color:var(--text);font-size:.77rem;line-height:1.4;margin-bottom:3px}
.hist-time{color:var(--text3);font-size:.64rem;font-family:'JetBrains Mono',monospace}
.sidebar-empty{color:var(--text3);font-size:.77rem;text-align:center;margin-top:32px;line-height:1.7}

/* ── Main ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}

/* ── Topbar ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:var(--topbar-bg);
  border-bottom:1px solid var(--surface-border);
  backdrop-filter:blur(16px);
  flex-shrink:0;
}
.topbar-center{text-align:center}
.topbar-logo{font-size:1.3rem;line-height:1}
.topbar-name{color:var(--text);font-weight:700;font-size:1.08rem;letter-spacing:-.03em}
.topbar-sub{color:var(--text2);font-size:.62rem;letter-spacing:.05em;text-transform:uppercase;font-weight:500}
.topbar-btn{
  background:var(--surface);border:1px solid var(--surface-border);
  border-radius:9px;padding:6px 12px;cursor:pointer;
  color:var(--text);font-size:.78rem;font-family:'Sora',sans-serif;
  font-weight:500;transition:background .18s,border-color .18s;
}
.topbar-btn:hover{background:var(--chip-bg);border-color:var(--chip-border)}

/* ── Feature strip ── */
#features{
  display:flex;gap:8px;padding:10px 14px;
  border-bottom:1px solid var(--surface-border);
  overflow-x:auto;flex-shrink:0;scrollbar-width:none;
}
#features::-webkit-scrollbar{display:none}
.feature-card{
  flex:1;min-width:154px;max-width:240px;
  background:var(--surface);border:1px solid var(--surface-border);
  border-radius:12px;padding:10px 12px;
}
.feature-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.feature-card-title{color:var(--text);font-weight:600;font-size:.76rem}
.badge{
  background:var(--badge-bg);color:var(--badge-text);
  font-size:.58rem;font-weight:600;
  padding:2px 7px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase;
}
.feature-text{color:var(--text2);font-size:.72rem;line-height:1.55}
.feature-empty{color:var(--text3);font-size:.71rem}
.feat-btn{
  background:var(--accent);border:none;border-radius:7px;
  color:#fff;font-size:.66rem;font-family:'Sora',sans-serif;font-weight:600;
  padding:4px 10px;cursor:pointer;transition:opacity .18s,filter .18s;
  letter-spacing:.02em;
}
.feat-btn:disabled{opacity:.45;cursor:not-allowed}
.feat-btn:not(:disabled):hover{filter:brightness(1.15)}
.feat-btn-ghost{
  background:var(--chip-bg);border:1px solid var(--chip-border);
  border-radius:8px;color:var(--chip-text);font-size:.72rem;
  font-family:'Sora',sans-serif;font-weight:500;
  padding:5px 10px;cursor:pointer;width:100%;transition:background .18s;
}
.feat-btn-ghost:hover{background:var(--hist-hover)}
.quiz-row{display:flex;gap:6px}
.quiz-input{
  flex:1;background:var(--input-bg);border:1px solid var(--input-border);
  border-radius:7px;color:var(--text);font-size:.72rem;
  font-family:'Sora',sans-serif;padding:5px 9px;outline:none;
}
.quiz-input::placeholder{color:var(--text3)}
.suggest-chips{display:flex;flex-direction:column;gap:4px}
.suggest-chip{
  background:var(--chip-bg);border:1px solid var(--chip-border);
  border-radius:7px;color:var(--chip-text);font-size:.67rem;
  font-family:'Sora',sans-serif;padding:4px 9px;
  cursor:pointer;text-align:left;transition:background .15s;line-height:1.4;
}
.suggest-chip:hover{background:var(--hist-hover)}

/* ── Chat ── */
#chat{flex:1;overflow-y:auto;padding:16px 16px 8px}

.subject-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:14px}
.subject-tag{
  font-size:.57rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;padding:2px 8px;border-radius:99px;
  color:#0d0b14;cursor:pointer;transition:opacity .15s;
}
.subject-tag:hover{opacity:.8}
.clear-btn{
  margin-left:auto;background:none;border:none;cursor:pointer;
  color:var(--text2);font-size:.7rem;font-family:'Sora',sans-serif;
  padding:2px 6px;border-radius:6px;transition:color .15s,background .15s;
}
.clear-btn:hover{background:var(--chip-bg);color:var(--accent)}

.msg-row{display:flex;align-items:flex-start;margin-bottom:12px;animation:fadeUp .22s ease both}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{gap:8px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;margin-top:2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 0 12px var(--accent-glow);
}
.bubble{max-width:78%;padding:10px 14px;font-size:.86rem;line-height:1.7;border-radius:4px 18px 18px 18px}
.bubble.user{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-radius:18px 18px 4px 18px;
  box-shadow:0 4px 20px var(--accent-glow);
}
.bubble.bot{background:var(--bubble-bot);border:1px solid var(--bubble-bot-border);color:var(--text)}
.bubble code{background:var(--code-bg);padding:2px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:.83em}
.bubble ul{padding-left:18px;margin:4px 0}
.bubble li{margin-bottom:3px}
.bubble strong{font-weight:600}
.bubble em{font-style:italic}

.typing-dots{display:flex;gap:5px;padding:8px 2px;align-items:center}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent);display:block;
  animation:tdBounce 1.1s infinite ease-in-out;
}
@keyframes tdBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}

/* ── Safe area (notch / home bar) ── */
#topbar{
  padding-top: max(10px, env(safe-area-inset-top));
}
#inputbar{
  padding-bottom: max(10px, env(safe-area-inset-bottom));
}

#starters{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px;flex-shrink:0}
.starter-chip{
  background:var(--chip-bg);border:1px solid var(--chip-border);
  border-radius:99px;color:var(--chip-text);
  font-size:.73rem;font-family:'Sora',sans-serif;font-weight:500;
  padding:5px 12px;cursor:pointer;
  transition:background .18s,transform .15s;
}
.starter-chip:hover{background:var(--hist-hover);transform:translateY(-1px)}

/* ── Char hint ── */
#char-hint{color:var(--text3);font-size:.62rem;text-align:right;padding:0 16px 6px;flex-shrink:0;font-family:'JetBrains Mono',monospace;display:none}

/* ── Input bar ── */
#inputbar{
  padding:10px 14px;
  border-top:1px solid var(--surface-border);
  display:flex;gap:8px;align-items:flex-end;
  background:var(--topbar-bg);backdrop-filter:blur(16px);
  flex-shrink:0;
}
#inputbar textarea{
  flex:1;background:var(--input-bg);
  border:1px solid var(--input-border);
  border-radius:14px;color:var(--text);
  font-size:.92rem;font-family:'Sora',sans-serif;
  padding:11px 14px;line-height:1.5;resize:none;
  outline:none;transition:border-color .18s;
  min-height:46px;max-height:120px;overflow-y:auto;
  -webkit-appearance:none;
}
#inputbar textarea::placeholder{color:var(--text3)}
#inputbar textarea:focus{border-color:var(--accent)}
#send-btn{
  width:46px;height:46px;flex-shrink:0;
  background:var(--accent);border:none;border-radius:14px;
  color:#fff;font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:filter .18s,background .18s,box-shadow .18s;
  box-shadow:0 3px 14px var(--accent-glow);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
#send-btn:disabled{background:var(--input-border);box-shadow:none;cursor:not-allowed}
#send-btn:not(:disabled):hover{filter:brightness(1.15);box-shadow:0 4px 20px var(--accent-glow)}
</style>
</head>
<body>

<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-inner">
      <div class="sidebar-header">
        <span class="sidebar-title">📚 History</span>
        <button class="topbar-btn" id="clear-hist-btn" onclick="clearHistory()" style="font-size:.65rem;padding:3px 9px;display:none">Clear</button>
      </div>
      <p class="sidebar-empty" id="hist-empty">Your questions<br/>will appear here</p>
      <div id="hist-list"></div>
    </div>
  </aside>

  <!-- Main -->
  <div id="main">

    <!-- Topbar -->
    <div id="topbar">
      <button class="topbar-btn" id="hist-toggle-btn" onclick="toggleSidebar()">☰ History</button>
      <div class="topbar-center">
        <div class="topbar-logo">🎓</div>
        <div class="topbar-name">EduBot</div>
        <div class="topbar-sub">AI Learning Companion</div>
      </div>
      <button class="topbar-btn" id="theme-btn" onclick="toggleTheme()">☀️ Light</button>
    </div>

    <!-- Feature strip -->
    <div id="features">

      <!-- Did You Know -->
      <div class="feature-card">
        <div class="feature-card-header">
          <span class="feature-card-title">🧠 Did You Know?</span>
          <button class="feat-btn" id="dyk-btn" onclick="handleDyk()">Generate</button>
        </div>
        <p class="feature-text" id="dyk-text"><span class="feature-empty">Click Generate for a surprise fact!</span></p>
      </div>

      <!-- Quiz Me -->
      <div class="feature-card">
        <div class="feature-card-header">
          <span class="feature-card-title">📝 Quiz Me</span>
          <span class="badge">Claude</span>
        </div>
        <div id="quiz-collapsed">
          <button class="feat-btn-ghost" onclick="showQuizInput()">Start a quiz →</button>
        </div>
        <div id="quiz-expanded" style="display:none">
          <div class="quiz-row">
            <input class="quiz-input" id="quiz-topic" placeholder="Enter a topic…" onkeydown="if(event.key==='Enter')handleQuiz(); if(event.key==='Escape')hideQuizInput()"/>
            <button class="feat-btn" onclick="handleQuiz()">Go!</button>
          </div>
        </div>
      </div>

      <!-- Explore More -->
      <div class="feature-card">
        <div class="feature-card-header">
          <span class="feature-card-title">💡 Explore More</span>
          <button class="feat-btn" id="suggest-btn" onclick="handleSuggest()" disabled title="Chat first to get suggestions">Suggest</button>
        </div>
        <div id="suggest-area">
          <p class="feature-empty" id="suggest-empty">Chat first, then get ideas!</p>
        </div>
      </div>

    </div><!-- /features -->

    <!-- Chat -->
    <div id="chat">
      <div class="subject-row" id="subject-row"></div>
      <div id="messages"></div>
      <div id="typing-indicator" style="display:none" class="msg-row bot">
        <div class="avatar">🎓</div>
        <div class="bubble bot"><div class="typing-dots"><span></span><span style="animation-delay:.18s"></span><span style="animation-delay:.36s"></span></div></div>
      </div>
      <div id="bottom-anchor"></div>
    </div>

    <!-- Starters -->
    <div id="starters"></div>

    <!-- Char hint -->
    <div id="char-hint"></div>

    <!-- Input bar -->
    <div id="inputbar">
      <textarea id="msg-input" rows="1" placeholder="What's on your mind?" oninput="onInputChange()" onkeydown="onInputKeyDown(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled aria-label="Send">➤</button>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script>
// ── Constants ──────────────────────────────────────────────────────────────────
const SYSTEM_PROMPT = `You are EduBot, a warm and encouraging educational assistant for learners of all ages. Your role is to:
- Explain concepts clearly using simple language, analogies, and examples
- Break down complex topics into digestible steps
- Ask guiding questions to help students think critically
- Celebrate curiosity and effort
- Adapt your explanation depth based on the student's apparent level
- Use emojis occasionally to keep things engaging
- If a student seems stuck, offer hints rather than just answers
Keep responses focused and concise (3–5 sentences unless a longer explanation is truly needed).`;

const WELCOME = "Hi there! 👋 I'm **EduBot**, your personal learning companion.\n\nAsk me anything — science, history, math, or literature. Let's learn together! 🎓";

const STARTER_CHIPS = [
  "How does photosynthesis work?",
  "Explain gravity simply",
  "Pythagorean theorem?",
  "Why did WW1 start?",
  "What is DNA?",
  "How do computers work?",
];

const SUBJECT_TAGS = [
  { label: "Science",    color: "#7dd3fc" },
  { label: "Math",       color: "#86efac" },
  { label: "History",    color: "#fcd34d" },
  { label: "Literature", color: "#f9a8d4" },
  { label: "Tech",       color: "#c4b5fd" },
];

// ── State ─────────────────────────────────────────────────────────────────────
let messages = [{ role: "assistant", content: WELCOME }];
let history  = [];
let loading  = false;
let isDark   = true;

// ── API (secure proxy — key lives on the server, never exposed) ───────────────
async function claudeCall(msgs, system) {
  const res = await fetch("/api/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages: msgs, system })
  });
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || "Request failed");
  return data.text || "";
}

// ── Markdown renderer (fixed ul wrapping) ────────────────────────────────────
function renderMd(text) {
  // escape HTML first
  let s = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  // inline formatting
  s = s
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/^#{1,3} (.+)$/gm, "<strong>$1</strong>");

  // list items — group consecutive lines into one <ul>
  s = s.replace(/((?:^[-•] .+\n?)+)/gm, match => {
    const items = match
      .trim()
      .split("\n")
      .filter(Boolean)
      .map(line => `<li>${line.replace(/^[-•] /, "")}</li>`)
      .join("");
    return `<ul>${items}</ul>`;
  });

  // paragraphs
  s = s.replace(/\n{2,}/g, "<br/><br/>").replace(/\n/g, "<br/>");
  return s;
}

// ── Render helpers ────────────────────────────────────────────────────────────
function appendMessage(msg) {
  const isUser = msg.role === "user";
  const row = document.createElement("div");
  row.className = `msg-row ${isUser ? "user" : "bot"}`;

  if (!isUser) {
    const av = document.createElement("div");
    av.className = "avatar";
    av.textContent = "🎓";
    row.appendChild(av);
  }

  const bubble = document.createElement("div");
  bubble.className = `bubble ${isUser ? "user" : "bot"}`;
  bubble.innerHTML = renderMd(msg.content);
  row.appendChild(bubble);

  document.getElementById("messages").appendChild(row);
  scrollBottom();
}

function scrollBottom() {
  document.getElementById("bottom-anchor").scrollIntoView({ behavior: "smooth" });
}

function renderHistory() {
  const list  = document.getElementById("hist-list");
  const empty = document.getElementById("hist-empty");
  const btn   = document.getElementById("clear-hist-btn");
  list.innerHTML = "";
  if (history.length === 0) {
    empty.style.display = "block";
    btn.style.display   = "none";
    return;
  }
  empty.style.display = "none";
  btn.style.display   = "inline-block";
  history.forEach(h => {
    const item = document.createElement("div");
    item.className = "hist-item";
    item.innerHTML = `<div class="hist-text">${h.text.length > 56 ? h.text.slice(0, 56) + "…" : h.text}</div><div class="hist-time">${h.time}</div>`;
    item.onclick = () => sendMessage(h.text);
    list.appendChild(item);
  });
}

function renderStarters(show) {
  const el = document.getElementById("starters");
  el.innerHTML = "";
  if (!show) return;
  STARTER_CHIPS.forEach(q => {
    const btn = document.createElement("button");
    btn.className = "starter-chip";
    btn.textContent = q;
    btn.onclick = () => sendMessage(q);
    el.appendChild(btn);
  });
}

function renderSubjects() {
  const row = document.getElementById("subject-row");
  SUBJECT_TAGS.forEach(({ label, color }) => {
    const span = document.createElement("span");
    span.className = "subject-tag";
    span.textContent = label;
    span.style.background = color;
    span.title = `Ask about ${label}`;
    span.onclick = () => sendMessage(`Tell me something interesting about ${label}`);
    row.appendChild(span);
  });
  const clearBtn = document.createElement("button");
  clearBtn.className = "clear-btn";
  clearBtn.innerHTML = "🗑 Clear";
  clearBtn.onclick = clearChat;
  row.appendChild(clearBtn);
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage(text) {
  const input = document.getElementById("msg-input");
  const txt = (text || input.value).trim();
  if (!txt || loading) return;
  input.value = "";
  input.style.height = "auto";
  updateSendBtn();
  updateCharHint();

  // history — allow duplicates (just move to top)
  history = [
    { text: txt, time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) },
    ...history.filter(h => h.text !== txt)
  ].slice(0, 40);
  renderHistory();

  messages.push({ role: "user", content: txt });
  appendMessage({ role: "user", content: txt });

  // hide starters after first message
  renderStarters(false);
  updateSuggestBtn();

  setLoading(true);

  try {
    const apiMsgs = messages.map(m => ({ role: m.role, content: m.content }));
    const reply = await claudeCall(apiMsgs, SYSTEM_PROMPT);
    const botMsg = { role: "assistant", content: reply || "Hmm, try again!" };
    messages.push(botMsg);
    appendMessage(botMsg);
  } catch (e) {
    const errMsg = { role: "assistant", content: "⚠️ Something went wrong. Please try again." };
    messages.push(errMsg);
    appendMessage(errMsg);
  } finally {
    setLoading(false);
    input.focus();
  }
}

function setLoading(val) {
  loading = val;
  document.getElementById("typing-indicator").style.display = val ? "flex" : "none";
  updateSendBtn();
  if (val) scrollBottom();
}

function updateSendBtn() {
  const btn = document.getElementById("send-btn");
  const txt = document.getElementById("msg-input").value.trim();
  btn.disabled = loading || !txt;
  btn.textContent = loading ? "⏳" : "➤";
}

function updateSuggestBtn() {
  const hasConvo = messages.length > 1;
  const btn = document.getElementById("suggest-btn");
  btn.disabled = !hasConvo;
  btn.title = hasConvo ? "" : "Chat first to get suggestions";
  document.getElementById("suggest-empty").textContent = hasConvo
    ? "Click Suggest for follow-up ideas!"
    : "Chat first, then get ideas!";
}

// ── Input handlers ────────────────────────────────────────────────────────────
function onInputChange() {
  const ta = document.getElementById("msg-input");
  ta.style.height = "auto";
  ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
  updateSendBtn();
  updateCharHint();
}

function onInputKeyDown(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function updateCharHint() {
  const len = document.getElementById("msg-input").value.length;
  const hint = document.getElementById("char-hint");
  if (len > 200) {
    hint.textContent = `${len} chars`;
    hint.style.display = "block";
  } else {
    hint.style.display = "none";
  }
}

// ── Features ──────────────────────────────────────────────────────────────────
async function handleDyk() {
  const btn  = document.getElementById("dyk-btn");
  const text = document.getElementById("dyk-text");
  btn.disabled = true;
  btn.textContent = "…";
  text.innerHTML = '<span class="feature-empty">Loading…</span>';
  try {
    const fact = await claudeCall([{
      role: "user",
      content: "Give me one surprising educational 'Did You Know' fact. 1–2 sentences. Start with '🧠 Did you know'. Make it genuinely mind-blowing. Vary topic each time."
    }]);
    text.textContent = fact;
  } catch {
    text.innerHTML = '<span class="feature-empty">⚠️ Couldn\'t load a fact.</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = "Generate";
  }
}

function showQuizInput() {
  document.getElementById("quiz-collapsed").style.display = "none";
  document.getElementById("quiz-expanded").style.display  = "block";
  document.getElementById("quiz-topic").focus();
}

function hideQuizInput() {
  document.getElementById("quiz-expanded").style.display  = "none";
  document.getElementById("quiz-collapsed").style.display = "block";
  document.getElementById("quiz-topic").value = "";
}

async function handleQuiz() {
  const t = document.getElementById("quiz-topic").value.trim();
  if (!t) return;
  hideQuizInput();
  await sendMessage(
    `Quiz me on: ${t}. Ask one multiple-choice question with 4 options (A, B, C, D). After I answer, tell me if I'm right and explain why.`
  );
}

async function handleSuggest() {
  const btn  = document.getElementById("suggest-btn");
  const area = document.getElementById("suggest-area");
  if (messages.length < 3) return;
  btn.disabled = true;
  btn.textContent = "…";
  area.innerHTML = '<p class="feature-empty">Loading…</p>';
  try {
    const topics = messages
      .filter(m => m.role === "user")
      .slice(-3)
      .map(m => m.content)
      .join(", ");
    const raw = await claudeCall([{
      role: "user",
      content: `Based on a student asking about: "${topics}", suggest 4 short follow-up questions. Return ONLY a JSON array of 4 strings, no markdown, no explanation.`
    }]);
    const clean = raw.replace(/```json|```/g, "").trim();
    const suggestions = JSON.parse(clean);
    area.innerHTML = "";
    const chips = document.createElement("div");
    chips.className = "suggest-chips";
    suggestions.forEach(s => {
      const b = document.createElement("button");
      b.className = "suggest-chip";
      b.textContent = s;
      b.onclick = () => sendMessage(s);
      chips.appendChild(b);
    });
    area.appendChild(chips);
  } catch {
    area.innerHTML = '<p class="feature-empty">⚠️ Couldn\'t load suggestions.</p>';
  } finally {
    btn.disabled = false;
    btn.textContent = "Suggest";
    updateSuggestBtn();
  }
}

// ── Sidebar / theme ───────────────────────────────────────────────────────────
function toggleSidebar() {
  const sb  = document.getElementById("sidebar");
  const btn = document.getElementById("hist-toggle-btn");
  const open = sb.classList.toggle("open");
  btn.textContent = open ? "✕ Close" : "☰ History";
}

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle("light", !isDark);
  document.getElementById("theme-btn").textContent = isDark ? "☀️ Light" : "🌙 Dark";
}

function clearChat() {
  messages = [{ role: "assistant", content: "Chat cleared! 🧹 What would you like to learn?" }];
  document.getElementById("messages").innerHTML = "";
  appendMessage(messages[0]);
  document.getElementById("suggest-area").innerHTML = '<p class="feature-empty" id="suggest-empty">Chat first, then get ideas!</p>';
  renderStarters(false);
  updateSuggestBtn();
}

function clearHistory() {
  history = [];
  renderHistory();
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init() {
  appendMessage(messages[0]);
  renderStarters(true);
  renderSubjects();
  renderHistory();
  updateSuggestBtn();
}

init();
</script>
